<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原材料调整看板 - 品质模块</title>
    <script>
        (function () {
            const sources = [
                "../../../assets/vendor/echarts.min.js",
                "https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"
            ];
            window.loadEcharts = function (callback) {
                if (window.echarts) return callback();
                let index = 0;
                const loadNext = () => {
                    if (window.echarts) return callback();
                    if (index >= sources.length) {
                        document.addEventListener("DOMContentLoaded", () => {
                            document.querySelectorAll(".chart").forEach(node => {
                                node.innerHTML = '<div class="empty">图表库加载失败，请检查本地资源路径</div>';
                            });
                        });
                        return;
                    }
                    const script = document.createElement("script");
                    script.src = sources[index++];
                    script.onload = callback;
                    script.onerror = loadNext;
                    document.head.appendChild(script);
                };
                loadNext();
            };
        })();
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #165DFF;
            --success: #00B42A;
            --warning: #FF7D00;
            --danger: #F53F3F;
            --accent: #722ED1;
            --cyan: #14C9C9;
            --bg-page: #F5F7FB;
            --bg-card: #FFFFFF;
            --bg-soft: #F8FAFF;
            --border: #E5E8EF;
            --text-primary: #1D2129;
            --text-secondary: #4E5969;
            --text-muted: #86909C;
            --shadow: 0 4px 14px rgba(16, 31, 67, 0.06);
        }

        body.dark-theme {
            --bg-page: #111827;
            --bg-card: #182033;
            --bg-soft: #202A3D;
            --border: #344054;
            --text-primary: #F5F7FB;
            --text-secondary: #D0D5DD;
            --text-muted: #98A2B3;

            font-size: 14px;
        }

        }

        }

        }

        .brand-subtitle {

            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-primary);
        }

            background: var(--primary);

        }

        .btn.primary:hover {

            background: #0E42D2;
        }

        .container {

            margin: 0 auto;
            padding: 20px 24px 32px;
        }

        .page-head {

            align-items: flex-end;

        .page-subtitle {

            justify-content: flex-end;

            padding: 16px;

            color: var(--text-secondary);

        }

            height: 22px;

            margin-bottom: 6px;
            border-radius: 999px;
            background: rgba(255, 125, 0, 0.12);
            color: #d46b08;
            font-size: 12px;
            font-weight: 700;
        }

        .annotation-block {

        .annotation-block p,

        .annotation-block ul {

        .summary-card {

            border-radius: 8px;

        .sample-grid {

            grid-template-columns: repeat(3, minmax(0, 1fr));

            align-items: center;

            border: 1px solid var(--border);
            border-radius: 8px;

        }

        .sample-name {

            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .info-tag {

            align-items: center;
            min-height: 22px;
            padding: 0 7px;
            border-radius: 999px;
            background: rgba(22, 93, 255, 0.08);
            color: var(--primary);
            font-size: 12px;
            line-height: 1;
            white-space: nowrap;
        }

        .detail-link {

            align-items: center;
            justify-content: center;
            min-height: 26px;
            padding: 0 10px;
            border: 1px solid rgba(22, 93, 255, 0.18);
            border-radius: 999px;
            background: rgba(22, 93, 255, 0.08);
            color: var(--primary);
            font-size: 12px;
            font-weight: 600;
        }

        .view {

        }

        .view.active {
            display: block;
        }

        .detail-layout {
            display: grid;
            grid-template-columns: repeat(12, minmax(0, 1fr));
            gap: 14px;
        }

        .card {
            position: relative;
            min-width: 0;
            padding: 16px;
        }

        .col-4 {
            grid-column: span 6;
        }

        .col-5 {
            grid-column: span 6;
        }

        .col-7 {
            grid-column: span 6;
        }

        .col-8 {
            grid-column: span 6;
        }

        .col-12 {
            grid-column: span 12;
        }

        .col-third {
            grid-column: span 4;
        }

        .card-head {

            align-items: flex-start;
            justify-content: space-between;

            margin-bottom: 12px;

        .card-title {

            font-weight: 700;

        .card-note {

        .chart {

        .chart.small {

        .detail-kpis {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }

        .detail-kpi {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 78px;

            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-soft);
            text-align: center;

        .detail-kpi strong {

            align-items: baseline;
            justify-content: center;

            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;

        .analysis-item {

            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-soft);

        .analysis-item span {

        .analysis-item strong {

            margin-top: 8px;
            font-size: 20px;
        }

        .hidden {

        }

        .can-monitor.hidden {

        }

        .can-monitor-head {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .can-monitor-head label {
            color: var(--text-muted);
            font-size: 12px;
        }

        .can-monitor-head select {
            width: 180px;
            height: 34px;
            padding: 0 10px;
            color: var(--text-primary);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
        }

        .section-label {
            margin: 12px 0 10px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 700;

        .can-meta-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }

        .can-data-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
        }

        .can-data-grid.two-row {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .flavor-input-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-card);
        }

        .flavor-input-head {
            display: grid;
            place-items: center;
            min-height: 58px;
            padding: 10px;
            border-right: 1px solid var(--border);
            background: rgba(22, 93, 255, 0.08);

            font-size: 16px;
            font-weight: 700;
            text-align: center;

        .flavor-input-cell {
            padding: 10px 16px;
            border-top: 1px solid var(--border);
            border-right: 1px solid var(--border);

            display: flex;

            font-size: 16px;

        .flavor-field .select-arrow {
            color: var(--text-muted);
            font-size: 14px;

            display: block;
            color: var(--text-muted);
            font-size: 12px;
            text-align: center;

            margin-top: 6px;

            font-size: 11px;
            font-weight: 500;

            align-items: center;
            justify-content: center;
            margin-top: 10px;
            min-height: 28px;

            font-size: 20px;

            color: var(--text-muted);
            font-size: 14px;
        }

            background: rgba(245, 63, 63, 0.05);
        }

        .can-chart {
            height: 340px;
            margin-top: 14px;
        }

            overflow: auto;
            border: 1px solid var(--border);
            border-radius: 8px;

            border-collapse: collapse;

</head>

        function unique(list, key) {

        function formatRate(value) {

        }

        function completedRows(list) {
            return list.filter(row => ["合格", "不合格"].includes(row.result));
        }

        function passRate(list) {
            const done = completedRows(list);
            if (!done.length) return NaN;
            return done.filter(row => row.result === "合格").length / done.length * 100;
        }

        function recheckRows(list) {
            return list.filter(row => row.recheck);
        }

        function recheckRate(list) {
            return list.length ? recheckRows(list).length / list.length * 100 : 0;
        }

        function metricStats(values) {
            const mean = values.reduce((sum, value) => sum + value, 0) / values.length;
            const variance = values.reduce((sum, value) => sum + Math.pow(value - mean, 2), 0) / values.length;
            return { mean, min: Math.min(...values), max: Math.max(...values), deviation: Math.sqrt(variance) };
        }

        function formatMetricNumber(value, metric, forcePrecision = false) {
            const precision = metric.unit === "%" ? 1 : 2;
            return !forcePrecision && Number.isInteger(value) ? String(value) : value.toFixed(precision);
        }

        function getFilteredRows() {
            const start = document.getElementById("startDate").value;
            const end = document.getElementById("endDate").value;
            const supplier = document.getElementById("supplierFilter").value;
            return rows.filter(row => {
                const dateHit = (!start || row.date >= start) && (!end || row.date <= end);
                const supplierHit = supplier === "all" || row.supplier === supplier;
                return dateHit && supplierHit;
            });
        }

        function rowsForMaterial(list, material) {
            return list.filter(row => row.material === (material.dataKey || material.name));
        }

        function toDate(value) {
            return new Date(`${value}T00:00:00`);
        }

        function toIsoDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, "0");
            const day = String(date.getDate()).padStart(2, "0");
            return `${year}-${month}-${day}`;
        }

        function addDays(date, days) {
            const next = new Date(date);
            next.setDate(next.getDate() + days);
            return next;
        }

        function dateLabel(value) {
            return value.slice(5).replace("-", "/");
        }

        function buildBuckets() {
            const period = document.getElementById("periodType").value;
            const start = document.getElementById("startDate").value;
            const end = document.getElementById("endDate").value;
            if (!start || !end || end < start) return [];
            const buckets = [];
            const endDate = toDate(end);
            let cursor = toDate(start);
            while (cursor <= endDate) {
                const bucketStart = new Date(cursor);
                let bucketEnd = new Date(cursor);
                if (period === "week") bucketEnd = addDays(bucketStart, 6);
                if (period === "month") bucketEnd = new Date(bucketStart.getFullYear(), bucketStart.getMonth() + 1, 0);
                if (bucketEnd > endDate) bucketEnd = new Date(endDate);
                const startIso = toIsoDate(bucketStart);
                const endIso = toIsoDate(bucketEnd);
                const label = period === "day" ? dateLabel(startIso) : period === "week" ? `${dateLabel(startIso)}-${dateLabel(endIso)}` : `${bucketStart.getFullYear()}/${String(bucketStart.getMonth() + 1).padStart(2, "0")}`;
                buckets.push({ start: startIso, end: endIso, label });
                cursor = addDays(bucketEnd, 1);
            }
            return buckets;
        }

        function supplierStats(list) {
            return unique(list, "supplier").map(name => {
                const supplierRows = list.filter(row => row.supplier === name);
                return { name, total: supplierRows.length, rate: passRate(supplierRows) };
            }).sort((a, b) => (b.total - a.total) || String(a.name).localeCompare(String(b.name), "zh-CN"));
        }

        function materialStats(material, list = getFilteredRows()) {
            const materialRows = rowsForMaterial(list, material);

            const failed = materialRows.filter(row => row.result === "不合格" || row.risk === "质量异常");
            const rechecks = recheckRows(materialRows);
            return {
                total: materialRows.length,
                submitted: materialRows.length,
                inspected: doneRows.length,
                passed: doneRows.filter(row => row.result === "合格").length,
                passRate: passRate(materialRows),
                failed: failed.length,
                rechecks: rechecks.length,
                recheckRate: recheckRate(materialRows),
                recheckPending: rechecks.filter(row => row.recheck && !row.recheck.closed).length,
                recheckPassed: rechecks.filter(row => row.recheck && row.recheck.result === "合格").length,
                recheckFailed: rechecks.filter(row => row.recheck && row.recheck.result === "不合格").length,

        function renderTrendChart(material, list) {
            const isCan = material.id === "can";
            const isLid = material.id === "lid";
            const isCarton = material.id === "carton";
            const isFilm = material.id === "film";
            const isSupplierTrend = supplierTrendMaterialIds.includes(material.id);
            const trendMode = document.getElementById("trendModeSelect").value;
            const filmProductType = document.getElementById("filmProductTypeSelect").value;
            const trendList = isFilm ? list.filter(row => row.productType === filmProductType) : list;
            const buckets = buildBuckets().map(bucket => ({ label: bucket.label, start: bucket.start, end: bucket.end, rows: trendList.filter(row => row.date >= bucket.start && row.date <= bucket.end) }));
            const buildSmoothSampleData = (scopedBuckets) => {
                const values = scopedBuckets.map(bucket => {
                    const scoredRows = bucket.rows.filter(row => Number.isFinite(row.score));
                    if (!scoredRows.length) return null;
                    const avg = scoredRows.reduce((sum, row) => sum + row.score, 0) / scoredRows.length;
                    return Number(avg.toFixed(1));
                });
                const knownIndexes = values.map((value, index) => Number.isFinite(value) ? index : -1).filter(index => index >= 0);
                if (!knownIndexes.length) return values;
                return values.map((value, index) => {
                    if (Number.isFinite(value)) return value;
                    const prev = knownIndexes.filter(item => item < index).pop();
                    const next = knownIndexes.find(item => item > index);
                    if (prev == null && next == null) return null;
                    if (prev == null) return values[next];
                    if (next == null) return values[prev];
                    const ratio = (index - prev) / (next - prev);
                    return Number((values[prev] + (values[next] - values[prev]) * ratio).toFixed(1));
                });
            };
            const buildSeriesData = (scopedBuckets, fallback = []) => scopedBuckets.map((bucket, index) => {
                const value = passRate(bucket.rows);
                const resolved = Number.isFinite(value) ? value : fallback[index % fallback.length];
                return Number.isFinite(resolved) ? Number(resolved.toFixed(1)) : null;
            });
            const fillRateSeriesData = (data) => {
                const knownIndexes = data.map((value, index) => Number.isFinite(value) ? index : -1).filter(index => index >= 0);
                if (!knownIndexes.length) return data;
                return data.map((value, index) => {
                    if (Number.isFinite(value)) return value;
                    const prev = knownIndexes.filter(item => item < index).pop();
                    const next = knownIndexes.find(item => item > index);
                    if (prev == null) return data[next];
                    if (next == null) return data[prev];
                    return data[index - prev <= next - index ? prev : next];
                });
            };
            const buildRateSeries = (groups) => groups.map((group, index) => ({
                name: group.name,
                type: "line",
                smooth: true,
                symbolSize: 7,
                connectNulls: true,
                data: fillRateSeriesData(buildSeriesData(buckets.map(bucket => ({
                    ...bucket,
                    rows: bucket.rows.filter(group.filter)
                })))),
                color: group.color || ["#165DFF", "#722ED1", "#14C9C9", "#FF7D00", "#00B42A", "#F53F3F"][index % 6],
                areaStyle: { opacity: groups.length === 1 ? 0.08 : 0.02 }
            }));
            const cartonGroups = () => {
                if (trendMode === "version") {
                    return cartonVersionLabels.map(name => ({ name, filter: row => row.version === name }));
                }
                if (trendMode === "supplier") {
                    return unique(list, "supplier").map(name => ({ name, filter: row => row.supplier === name }));
                }
                if (trendMode === "supplierVersion") {
                    return [...new Set(list.map(row => `${row.supplier} / ${row.version || "未标版本"}`))].filter(Boolean).map(name => ({
                        name,
                        filter: row => `${row.supplier} / ${row.version || "未标版本"}` === name
                    }));
                }
                return [{ name: "综合", filter: () => true, color: material.color }];
            };
            const supplierGroups = () => trendMode === "supplier"
                ? unique(trendList, "supplier").map(name => ({ name, filter: row => row.supplier === name }))
                : [{ name: "综合", filter: () => true, color: material.color }];
            const lidGroups = () => trendMode === "line"
                ? unique(trendList, "line").map(name => ({ name, filter: row => row.line === name }))
                : trendMode === "version"
                ? unique(trendList, "version").map(name => ({ name, filter: row => row.version === name }))
                : [{ name: "综合", filter: () => true, color: material.color }];
            const series = isLid
                ? buildRateSeries(lidGroups())
                : isCarton
                ? buildRateSeries(cartonGroups())
                : isSupplierTrend
                ? buildRateSeries(supplierGroups())
                : isCan && trendMode === "version"
                ? canVersionLabels.map((version, index) => ({
                    name: version,
                    type: "line",
                    smooth: true,
                    symbolSize: 7,
                    connectNulls: true,
                    data: buildSeriesData(buckets.map(bucket => ({ ...bucket, rows: bucket.rows.filter(row => row.version === version) })), canVersionTrendSamples[index]),
                    color: ["#FF7D00", "#165DFF", "#722ED1"][index],
                    areaStyle: { opacity: 0.03 }
                }))
                : [{
                    name: material.name,
                    type: "line",
                    smooth: true,
                    symbolSize: 7,
                    connectNulls: true,
                    data: buildSmoothSampleData(buckets),
                    color: material.color,
                    areaStyle: { opacity: 0.08 }
                }];
            const chart = disposeChart("trendChart");
            chart.setOption({
                ...chartBase(),
                tooltip: { ...chartBase().tooltip, trigger: "axis", valueFormatter: value => value == null ? "--" : `${value}%` },
                legend: (isCan && trendMode === "version") || (isLid && trendMode !== "overall") || isCarton || isSupplierTrend ? { top: 0, type: "scroll", textStyle: { color: "#4E5969" } } : undefined,
                grid: { left: 42, right: 24, top: (isCan && trendMode === "version") || (isLid && trendMode !== "overall") || isCarton || isSupplierTrend ? 70 : 42, bottom: 34, containLabel: true },
                xAxis: { type: "category", boundaryGap: false, data: buckets.map(item => item.label), axisLabel: { color: "#4E5969" }, axisLine: { lineStyle: { color: "#E5E8EF" } } },
                yAxis: { type: "value", min: isCarton || isSupplierTrend ? 0 : 80, max: 100, axisLabel: { color: "#4E5969", formatter: "{value}%" }, splitLine: { lineStyle: { color: "#E5E8EF" } } },
                series
            });
        }

        function defectRows(list) {
            return list.filter(row => row.result !== "合格" || row.risk || row.reason !== "-");
        }

        function countBy(list, key, fallback = "未分类") {
            return list.reduce((acc, row) => {
                const name = row[key] || fallback;
                acc[name] = (acc[name] || 0) + 1;
                return acc;
            }, {});
        }

        function renderDefectAnalysis(list, material) {
            const defects = defectRows(list);
            const countUnit = "次";
            renderDefectReasonChart(defects, countUnit);
            renderDefectLineChart(defects, countUnit, material);
            renderDefectTypeChart(defects, countUnit);
        }

        function renderDefectReasonChart(defects, unit) {
            const reasons = defects.reduce((acc, row) => {
                const name = row.reason !== "-" ? row.reason : row.result;
                acc[name] = (acc[name] || 0) + 1;
                return acc;
            }, {});
            const names = Object.keys(reasons);
            disposeChart("defectReasonChart").setOption({
                ...chartBase(),
                tooltip: { ...chartBase().tooltip, trigger: "axis", valueFormatter: value => `${value}${unit}` },
                xAxis: { type: "value", axisLabel: { color: "#4E5969" }, splitLine: { lineStyle: { color: "#E5E8EF" } } },
                yAxis: { type: "category", data: names.length ? names : ["无不良"], axisLabel: { color: "#4E5969" } },
                series: [{ name: "不良次数", type: "bar", barWidth: 18, data: names.length ? names.map(name => reasons[name]) : [0], color: "#F53F3F" }]
            });
        }

        function renderDefectLineChart(defects, unit, material) {
            const useWorkshop = material && material.id === "sugar";
            const groupKey = useWorkshop ? "workshop" : "line";
            const groupLabels = useWorkshop ? workshopLabels : lineLabels;

            const names = groupLabels.filter(name => groupCounts[name]).concat(Object.keys(groupCounts).filter(name => !groupLabels.includes(name)));
            document.getElementById("defectLineTitle").textContent = useWorkshop ? "不良类型车间" : "不良类型线别";
            disposeChart("defectLineChart").setOption({
                ...chartBase(),
                tooltip: { ...chartBase().tooltip, trigger: "axis", valueFormatter: value => `${value}${unit}` },
                xAxis: { type: "category", data: names.length ? names : ["无不良"], axisLabel: { color: "#4E5969" } },
                yAxis: { type: "value", axisLabel: { color: "#4E5969" }, splitLine: { lineStyle: { color: "#E5E8EF" } } },
                series: [{ name: "不良次数", type: "bar", barWidth: 18, data: names.length ? names.map(name => groupCounts[name]) : [0], color: "#FF7D00" }]
            });
        }

        function renderDefectTypeChart(defects, unit) {
            const typeCounts = countBy(defects, "productType");

        function monitorMetricsForSelectedProduct(metrics) {
            const select = document.getElementById("filmMonitorProductTypeSelect");
            const type = select ? select.value : "红牛普通";
            const offsetMap = {
                "红牛普通": 0,
                "红牛强化": 0.35,
                "战马": -0.28
            };
            const offset = offsetMap[type] || 0;
            return Object.fromEntries(Object.entries(metrics).map(([name, metric]) => {
                const adjustedValues = metric.values.map((value, index) => {
                    const direction = index % 2 === 0 ? 1 : -1;
                    const scaledOffset = metric.unit === "kg" ? offset * 0.18 : metric.unit === "mm" ? offset * 0.32 : offset;
                    const adjusted = value + scaledOffset * direction;
                    return Number(adjusted.toFixed(metric.unit === "kg" ? 2 : 1));
                });
                return [name, { ...metric, values: adjustedValues }];
            }));
        }

                    series: [

            const csv = "\ufeff" + lines.map(line => line.map(value => `"${String(value).replace(/"/g, '""')}"`).join(",")).join("\n");

        function arrayFromAttr(value) {
            return value ? value.split("；").filter(Boolean) : [];
        }

        function normalizeAnnotationRule(id, target) {
            const staticRule = annotationLogic[id];
            if (staticRule) return staticRule;
            return {
                tag: target.dataset.annotationLabel || "--",
                title: target.dataset.annotationTitle || "取值逻辑",
                desc: target.dataset.annotationDesc || "当前元素的取值逻辑。",
                sources: arrayFromAttr(target.dataset.annotationSources),
                rules: arrayFromAttr(target.dataset.annotationRules),
                interaction: target.dataset.annotationInteraction || "点击标注元素查看取值说明。"
            };
        }

        function escapeHtml(value) {
            return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function renderRuleList(items) {
            const list = items && items.length ? items : ["待业务确认"];
            return `<ul>${list.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`;
        }

        function selectAnnotation(target) {
            document.querySelectorAll(".annotation-active").forEach(node => node.classList.remove("annotation-active"));
            target.classList.add("annotation-active");
            const rule = normalizeAnnotationRule(target.dataset.annotationId, target);
            document.getElementById("annotationPanelTag").textContent = rule.tag || target.dataset.annotationLabel || "--";
            document.getElementById("annotationPanelTitle").textContent = rule.title || "取值逻辑";
            document.getElementById("annotationPanelBody").innerHTML = `
                <div class="annotation-block">
                    <h4>用途说明</h4>
                    <p>${escapeHtml(rule.desc)}</p>
                </div>
                <div class="annotation-block">
                    <h4>来源单据</h4>
                    ${renderRuleList(rule.sources)}
                </div>
                <div class="annotation-block">
                    <h4>取值规则</h4>
                    ${renderRuleList(rule.rules)}
                </div>
                <div class="annotation-block">
                    <h4>交互规则</h4>
                    <p>${escapeHtml(rule.interaction)}</p>
                </div>
            `;
        }

        function visibleAnnotationTargets() {
            return [...document.querySelectorAll("[data-annotation-id]")].filter(node => {
                if (node.closest("#annotationPanel")) return false;
                if (node.offsetParent === null && getComputedStyle(node).position !== "fixed") return false;
                return true;
            });
        }

        function refreshAnnotationMarkers() {
            document.querySelectorAll(".annotation-marker").forEach(marker => marker.remove());
            if (!document.body.classList.contains("annotation-mode")) return;
            visibleAnnotationTargets().forEach(target => {
                const marker = document.createElement("span");
                marker.className = "annotation-marker";
                marker.textContent = target.dataset.annotationLabel || normalizeAnnotationRule(target.dataset.annotationId, target).tag || "";
                target.appendChild(marker);
            });
            const active = document.querySelector(".annotation-active[data-annotation-id]");
            if (!active || !document.body.contains(active)) {
                const first = visibleAnnotationTargets()[0];
                if (first) selectAnnotation(first);
            }
        }

        function toggleAnnotationMode(force) {
            const enable = typeof force === "boolean" ? force : !document.body.classList.contains("annotation-mode");
            if (enable) {
                toggleEditMode(false);
            }
            document.body.classList.toggle("annotation-mode", enable);
            document.getElementById("annotationButton").textContent = enable ? "退出标注" : "标注";
            if (!enable) {
                document.querySelectorAll(".annotation-marker").forEach(marker => marker.remove());
                document.querySelectorAll(".annotation-active").forEach(node => node.classList.remove("annotation-active"));
                return;
            }
            refreshAnnotationMarkers();
        }

        function handleAnnotationClick(event) {
            if (!document.body.classList.contains("annotation-mode")) return;
            if (event.target.closest("#annotationPanel") || event.target.closest("#annotationButton")) return;
            const target = event.target.closest("[data-annotation-id]");
            if (!target) return;
            event.preventDefault();
            event.stopPropagation();
            selectAnnotation(target);
            refreshAnnotationMarkers();
        }

        function toggleEditMode(force) {
            const enable = typeof force === "boolean" ? force : !document.body.classList.contains("edit-mode");
            if (enable && document.body.classList.contains("annotation-mode")) {
                toggleAnnotationMode(false);
            }
            document.body.classList.toggle("edit-mode", enable);
            document.getElementById("editButton").textContent = enable ? "退出编辑" : "编辑看板";
        }

        function bindEvents() {
            document.addEventListener("click", handleAnnotationClick, true);
            ["startDate", "endDate", "periodType", "supplierFilter"].forEach(id => {
                document.getElementById(id).addEventListener("change", refresh);
            });
            document.getElementById("canMetricSelect").addEventListener("change", () => {
                if (currentMaterialId === "carton") {
                    renderCanMonitor(materialById(currentMaterialId));
                    refreshAnnotationMarkers();
                    return;
                }
                renderCanMetricChart();
                refreshAnnotationMarkers();
            });
            document.getElementById("filmMonitorProductTypeSelect").addEventListener("change", () => {
                if (["can", "lid", "carton", "film"].includes(currentMaterialId)) {
                    renderCanMonitor(materialById(currentMaterialId));
                    refreshAnnotationMarkers();
                }
            });
            document.getElementById("trendModeSelect").addEventListener("change", () => {
                if (currentMaterialId) {
                    const material = materialById(currentMaterialId);
                    renderTrendChart(material, rowsForMaterial(getFilteredRows(), material));
                    refreshAnnotationMarkers();
                }
            });
            document.getElementById("filmProductTypeSelect").addEventListener("change", () => {
                if (currentMaterialId === "film") {
                    const material = materialById(currentMaterialId);
                    renderTrendChart(material, rowsForMaterial(getFilteredRows(), material));
                    refreshAnnotationMarkers();
                }
            });
            window.addEventListener("hashchange", () => {
                applyRoute();
                refresh();
            });
            window.addEventListener("resize", () => Object.values(charts).forEach(chart => chart.resize()));
        }

        function boot() {
            updateSupplierOptions();
            bindEvents();
            updateFilterSummary();
            applyRoute();
            updateTime();
            setInterval(updateTime, 1000);
        }

        window.loadEcharts(boot);
    </script>
</body>

</html>
